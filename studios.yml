  # ── BACKLOG — unresolved (await /career-ops resolve) ──────────────
  # Migrated from data/ats-research.md. These have no scannable feed yet, so
  # scan.mjs skips them; /career-ops resolve walks them and assigns a provider,
  # recipe, parser, or a blocked tag. Run `node track-check.mjs "Name"` first.

  - name: Warner Bros. Games
    provider: workday
    careers_url: https://warnerbros.wd5.myworkdayjobs.com/global
    # WBD's Workday tenant has no business-unit facet, so scope to the games
    # studios by their dedicated office addresses (each office ≈ one studio).
    locations:
      - "Rocksteady Studios"                 # London — Rocksteady
      - "Chicago 2650A W Bradley"            # NetherRealm
      - "Salt Lake City 175 East 400 South"  # Avalanche Software
      - "Remote Utah"                        # Avalanche (remote)
      - "Knutsford Canute Court"             # TT Games
      - "Montreal 888"                       # WB Games Montreal (mostly game; 1 payroll role leaks)
      - "Needham 117 Kendrick"               # WB Games Boston (Turbine)
    status: resolved
    last_probe: 2026-06-23
    notes: "Whole WBD careers (Phenom front-end at careers.wbd.com) is PerimeterX-gated, but the underlying Workday tenant (warnerbros.wd5) serves zero-token. The global site is all of WBD (462 jobs, HBO/CNN/Leavesden retail incl.) with NO games facet, so scoped by studio office address → ~18 jobs (verified 2026-06-23). Covers Rocksteady, NetherRealm, Avalanche, TT Games, WB Games Montreal + Boston. Earlier query='WB Games' searchText was dropped: fuzzy, leaked WBD (Roku/payroll) AND undercounted (missed an Avalanche role); office-list is exact + complete. One known leak: Montreal 888 is shared, so a non-game payroll role rides along (accepted for completeness). Deliberately excluded as non-game: SF 153 Kearny (Bleacher Report/sports), Burbank 750 (theatrical/corp), NY 30 Hudson (CNN). Player First has no cleanly-identifiable postings here (its name fuzzy-matches unrelated roles). Phenom's /c/game-development-jobs category (~15, craft-only) is a useful cross-check but can't be queried zero-token (gated XHR) and omits studio support roles."

  - name: LEGO Group (Games)
    provider: workday
    careers_url: https://lego.wd103.myworkdayjobs.com/LEGO_External
    # LEGO's whole-company Workday tenant (toys, retail, marketing, manufacturing).
    # No games business-unit facet, and the games roles sit in Billund/Copenhagen
    # alongside everything else, so `locations` can't isolate them. Scope server-
    # side by the keyword "game" (maps to Workday's searchText): LEGO brands its
    # in-house games effort consistently as Game Development / Game Ecosystem /
    # Gaming Passion, so this reliably catches the sector (~17 hits, 2026-06-23) —
    # every games role probed surfaced under it. Recall-first: pulls a little
    # marketing/licensing noise, which the downstream title filter ranks out.
    # Fail-safe — drop `query` to scan the whole company.
    query: "game"
    status: resolved
    last_probe: 2026-06-23
    notes: "LEGO's OWN in-house games division (announced Mar 2025), distinct from WB-owned TT Games. Centred on the LEGO Fortnite ecosystem with Epic + LEGO DESiGN interactive-play design; Billund/Copenhagen, Denmark. query='game' → ~17 postings incl. VP Head of Game Development (req is internally 'Head of LEGO Fortnite ecosystem'), Lead Software Engineer Game Ecosystem Integration, Software Engineer Unreal Engine Plugins, Senior Interactive Systems/Play Designers (LEGO DESiGN). Effort is Epic/Fortnite/Unreal-centric. Noise pulled: marketing/licensing 'Gaming Passion' roles + occasional far misses (a retail Sales Associate matched once) — accepted as recall-first; the targeting title filter downranks them. Tenant lego.wd103, site LEGO_External, zero-token cxs API."

