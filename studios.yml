  # ATS slug (probed greenhouse/lever/ashby/teamtailor/recruitee/workable, all
  # misses except a Parity *namesake* = Parity Technologies/Polkadot, NOT the
  # IS studio, so skipped). Flagship CCP→Fenris IS wired (Pinpoint json feed);
