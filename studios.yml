# Studio list — GAME INDUSTRY (TRACKED in git; shared with collaborators)
#
# Read by scan.mjs. This file holds ONLY the company list. Your personal
# targeting/filters (location/role/seniority weights) live in portals.yml, which
# is gitignored and NOT shared. Edit studios here; edit filters in portals.yml.
# scan.mjs reads companies from this file and filters from portals.yml.

# -- Tracked sources --
# Provider routing: greenhouse/lever/ashby auto-detect from careers_url; the
# `provider: hitmarker` entries are explicit (Hitmarker is an aggregated board,
# not one company — see providers/hitmarker.mjs).
#
# ── Resolution ladder (how an entry gets scanned, cheapest first) ─────
# This file is DUAL-PURPOSE: it holds both scannable studios AND the backlog of
# studios not yet wired up. scan.mjs scans the wired ones and silently skips the
# rest, so you can park 1000 names here and resolve them little by little
# (`/career-ops resolve`). An entry is on ONE of these rungs:
#
#   1. Shared ATS     provider: greenhouse|lever|ashby|teamtailor|... (or just
#                     careers_url for auto-detect). One provider, many studios.
#   2. Custom recipe  recipe: {kind: json|html, ...}  — homemade careers page,
#                     captured once during a browser pass, replayed zero-token.
#                     See providers/custom.mjs for the full schema. Example:
#                       - name: Some Studio
#                         careers_url: https://somestudio.com/careers
#                         recipe:
#                           kind: json
#                           endpoint: https://somestudio.com/api/openings
#                           list_path: data.jobs
#                           fields: { title: position.title, url: applyUrl, location: office.city }
#   3. Local parser   parser: {command: node, script: parsers/foo.mjs} — for
#                     sites too weird for a recipe (pagination, auth, odd markup).
#                     Code lives in a file; see providers/local-parser.mjs.
#   4. Backlog / tag  Not scannable yet — kept visible so it's walkable + dedup'd:
#                       status: unresolved          # not researched yet
#                       recipe: { kind: blocked, reason: "Cloudflare JS gate" }
#                       recipe: { kind: browser, reason: "needs Playwright pass" }
#                     last_probe: 2026-06-08         # optional, set by resolve
#
# Tokenless dedup before adding anything: `node track-check.mjs "Name" [--url domain]`.

# ── Aggregator employer blocklist ─────────────────────────────────────
# The aggregator boards below (Hitmarker, Work With Indies, Games Jobs Direct,
# Remote Game Jobs) are whole-industry feeds, so a few non-game employers leak in
# with hundreds of non-game corporate roles. scan.mjs drops these at ingest —
# before the snapshot and independent of personal targeting, so it holds on the
# public board too (which scans with --no-filter). Match is EXACT + case-
# insensitive on the posting's company name, and only applies to aggregator-host
# jobs (a curated studio feed is never affected).
#
# RULE: list a company here ONLY if ~100% of its postings are non-game. A mixed
# employer that also posts real game roles (e.g. Tencent, Keywords Studios) must
# NOT be listed — the title/role filter handles its noise instead. Each name
# below was verified against its actual live postings.
exclude_companies:
  - ByteDance              # cloud infra / AI-LLM research / sales — 0 game roles
  - Netflix Game Studio    # whole Netflix corporate careers (marketing/HR/post) leaking
  - Netflix Games Studios  # plural variant as it appears in aggregator feeds
  - NVIDIA                 # silicon / chip verification / hardware — 0 game roles
  - Aristocrat             # gambling / slot machines (casino), not video games
  - Logitech               # gaming hardware / peripherals
  - Corsair                # gaming hardware / peripherals
  - Razer                  # gaming hardware / peripherals
  - Skillz                 # cash-tournament / betting platform
  - JustPlay GmbH          # reward-app (play-for-rewards), not a games studio
  - War Child UK           # charity (gaming-fundraising partnerships)
  - Playtech               # iGaming / online-casino software (payroll/CRM/algos)
  - Rush Street Interactive # online casino + sportsbook (BetRivers)
  - Yggdrasil              # iGaming slots provider (Yggdrasil Gaming)
  - Evolution              # live online-casino games (Evolution Gaming)
  - Aristocrat             # slot machines / casino gaming (Aristocrat Gaming)
  - Aristocrat Gaming      # ASGC name variant of the above
  - Light & Wonder         # casino / lottery / social-casino (ex-Scientific Games)
  - High 5 Games           # social casino / slot-game maker (iGaming), not video games
  - Evoplay                # online-casino / slots provider (iGaming) — affiliate/licensing roles, not video games
  - SciPlay                # social casino (Light & Wonder subsidiary), not video games
  - Penn Interactive       # online casino + sportsbook (ESPN Bet / Penn Entertainment)
  - GRID Esports           # esports data/trading platform, not a game studio
  - GAMURS Group           # esports/games media network, not a game studio
  - Intel                  # silicon / hardware — 0 game roles
  - AMD                    # silicon / hardware — 0 game roles
  - Hasbro                 # toy/board-game corporate careers (video games via licensing only)
  - Cluetivity             # AR escape-room / location-based entertainment, not video games
  - Triotech Amusement     # location-based amusement attractions, not video games
  - Holo-Light             # industrial AR/XR software, not video games
  - Holo-Industrie 4.0 Software GmbH # Holo-Light's legal name as it appears in feeds
  - keywords-intl1         # Keywords Studios — games outsourcer (QA/loc/art), mass postings
  - Side (PTW)             # PTW/Side — games audio & localization outsourcer, mass postings
  - sonyglobal-sonyglobalcareers # Sony corporate global careers (PlayStation tracked separately)

tracked_companies:

  # ── Hitmarker — aggregated games / esports board ──────────────────
  # Facet IDs: 122733 Game Dev · 122713 Software Eng · 122698 Unity · 122699 Unreal
  #            122732 Game Design · 122691 Systems Design · 122743 Level Design
  #            122695 Technical Design · 122694 Technical Art · 122707 QA · 122734 Production

  # Location is filtered SERVER-SIDE here via jobLocation.parents.id — Hitmarker
  # has already geocoded every posting to a continent, so this is exhaustive by
  # construction (no string-matching, nothing silently dropped). Continent IDs:
  #   x4 Europe · rx4 Remote(EU) · x5 North America · rx5 Remote(NA) · x6 Oceania
  #   (x3 Asia is simply omitted, so it never leaves Hitmarker's server)
  - name: Hitmarker — Programming
    provider: hitmarker
    query: "*"
    filter_by: "jobTags.id:[122733,122713,122698,122699] && jobLocation.parents.id:[x4,rx4,x5,rx5,x6]"
    pages: 3
    enabled: true

  - name: Hitmarker — Design & Systems
    provider: hitmarker
    query: "*"
    filter_by: "jobTags.id:[122732,122691,122743,122695,122773,122722,122723] && jobLocation.parents.id:[x4,rx4,x5,rx5,x6]"
    pages: 2
    enabled: true

  - name: Hitmarker — Technical Art & QA
    provider: hitmarker
    query: "*"
    filter_by: "jobTags.id:[122694,122707]"
    pages: 2
    enabled: true

  # ── Aggregator boards ─────────────────────────────────────────────
  # Like Hitmarker: one entry, many studios. See providers/workwithindies.mjs.

  - name: Work With Indies
    provider: work-with-indies
    notes: "Indie / remote-heavy aggregator. Junior-friendly. RSS-backed."
    enabled: true

  - name: Remote Game Jobs
    provider: remote-game-jobs
    notes: "Remote-only games board. All postings remote. RSS-backed. See providers/remotegamejobs.mjs."
    enabled: true

  - name: Games Jobs Direct
    provider: games-jobs-direct
    # Server-rendered ASP.NET board (no feed/API) — we walk /all-jobs?page=N and
    # parse the HTML cards. ~290 pages × 10 = ~2,900 postings; set `pages:` to cap.
    notes: "Whole-industry games board (UK/EU-heavy). HTML-scraped. See providers/gamesjobsdirect.mjs."
    enabled: true
    # This is a WHOLE-INDUSTRY board, so its sectors mix game-craft roles with
    # truly non-game ones. We drop the sectors that aren't games work at all.
    # Fail-safe: a card whose sector didn't parse is never dropped. Full taxonomy
    # is documented in providers/gamesjobsdirect.mjs.
    exclude_sectors:
      - Gambling                   # casino/slots (e.g. Aristocrat), not games
      - Web Development            # general web work, not game dev
      - VR and AI                  # generic AI/VR research roles
      - Journalism & Copywriting   # games media, not making games
      - eSports                    # competition/league ops, not dev
      - Education                  # teaching/academia
      # ── Business & back-office roles ───────────────────────────────────
      # Kept ON by default: these ARE game-industry jobs (Finance/HR/etc. at
      # game studios). Uncomment this block to drop them and keep only craft.
      # - Finance
      # - HR
      # - Legal
      # - Sales
      # - Marketing
      # - PR
      # - Administration
      # - Operations
      # - Customer Services

  - name: Rehm — uncovered ATS (games)
    provider: rehm
    # alexanderrehm.com curated games board (jobs.json). Scoped by DEFAULT to the
    # long tail of studios on an ATS we don't scan first-party (hrmos, ea-careers,
    # comeet, phenom, garena, eightfold, oracle-hcm, …) so it never double-counts
    # our direct feeds. Coverage is derived from providers/ automatically. Drops
    # exclude_companies + off-theme employers in-provider. `scope: all` to widen.
    # See providers/rehm.mjs.
    notes: "Curated games aggregator. Complementary long-tail (ATSes we don't ship a provider for)."
    enabled: true

  # ── Studios on Breezy HR ──────────────────────────────────────────
  # Per-company ATS (like greenhouse/lever): one entry per studio. Tenants live
  # at {slug}.breezy.hr and auto-detect from careers_url; the public feed is
