  # ══════════════════════════════════════════════════════════════════
  # -- Phenom (Phenom People) tenants — see providers/phenom.mjs.
  #    The Activision Blizzard family fronts its bot-protected Workday
  #    (xboxgaming.wd1 / activision.wd1, Cloudflare-gated) with PUBLIC
  #    Phenom career sites that serve zero-token. Each tenant is its own
  #    job pool (distinct jobSeqNo prefix), so no double-count between them
  #    — and once phenom ships, rehm's derived coverage drops these too.
  #    careers_url is the locale base; the provider appends /search-results.
  # ══════════════════════════════════════════════════════════════════
