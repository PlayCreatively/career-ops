# Board default filters — EDITABLE SOURCE (tracked, shared)
#
# This is the canonical source for the PUBLIC board's default filter buckets.
# Edit it here, then regenerate the JSON the board actually reads:
#
#     npm run board:default        # targeting.default.yml → site/data/targeting.json
#
# and commit BOTH. Humans edit this YAML; the board only ever reads the projected
# site/data/targeting.json. Same group schema + scorer as portals.yml, so the
# default and your personal config never drift in behaviour — they're just two
# instances of one model (this one neutral, yours tuned). Your personal filters
# live in portals.yml and never touch this file.
#
# ── Schema (see portals.personal.yml for a fully-tuned example) ───────────────
# targeting.groups[] = { name, field, combine, weight, filters[] }
#   field    title | company | location | department | workmode | experiencelevel
#            | any   (which job text to match; may be a [list] joined with spaces)
#   combine  min | max | avg                     (how matched filters reduce)
#   weight   cross-group importance for the fit  (normalized at use)
# filter = { name, keywords[], weight, else }
#   keywords  any-match (membership). Word-stem at a word start ("Programm" hits
#             Programmer); /slashes/ for regex ("/\bart\b/").
#   weight    NO weight key = INACTIVE (the neutral default state). When set:
#             0 = exclude · <1 lower · 1 neutral · >1 boost (max 2).
#   else      catch-all: matches only when no keyword filter in the group did.
#
# This default is NEUTRAL: every filter is inactive, so out of the box it ranks
# nothing up or down — it just gives visitors the buckets to switch on.

targeting:
  groups:
    - name: Discipline
      field: title
      combine: min
      weight: 0.30
      filters:
        - name: Programming
          keywords: [programmer, programming, engineer, developer, software, engine, gameplay engineer, graphics, rendering, backend, back-end, frontend, front-end, full stack, fullstack, tools, devops, network, physics, 'C++', 'C#', gameplay programmer, build, SDK, platform, systems engineer]
        - name: Art
          keywords: [artist, '/\bart\b/', '/\bVFX\b/', animator, animation, character, environment art, concept, modeler, modeller, rigging, lighting, texture, illustrator, outsource, 3D art]
        - name: Design
          keywords: [designer, design, level design, game design, narrative, writer, systems design, economy, combat design, encounter, quest]
        - name: Audio
          keywords: [audio, '/\bsound\b/', music, composer, '/\bSFX\b/', foley, dialogue]
        - name: Production
          keywords: [producer, production, project manager, program manager, scrum, product manager, delivery, release manager]
        - name: QA
          keywords: [QA, quality assurance, tester, '/\btest\b/', SDET, quality]
        - name: Data/ML
          keywords: ['data ', analytics, analyst, scientist, machine learning, '/\bML\b/', '/\bAI\b/', data engineer]
        - name: Marketing/Community
          keywords: [community, marketing, social media, brand, influencer, '/\bPR\b/', communications]
    - name: Region
      field: location
      combine: min
      weight: 0.22
      filters:
        - name: EEU
          keywords: [germany, berlin, munich, münchen, hamburg, cologne, frankfurt, france, paris, lyon, montpellier, bordeaux, toulouse, sweden, stockholm, malmö, gothenburg, göteborg, finland, helsinki, poland, warsaw, warszawa, kraków, krakow, wrocław, spain, madrid, barcelona, valencia, netherlands, amsterdam, utrecht, rotterdam, ireland, dublin, czech, brno, prague, denmark, copenhagen, norway, oslo, belgium, brussels, portugal, lisbon, porto, italy, milan, rome, austria, vienna, switzerland, zurich, geneva, romania, bucharest, hungary, budapest, '/\bCET\b/', '/\bEU\b/', '/\bEEA\b/', '/\bEFTA\b/', schengen, europe, malta, cyprus, greece, athens, estonia, tallinn, lithuania, vilnius, latvia, riga, croatia, zagreb, slovenia, ljubljana, slovakia, bratislava, bulgaria, sofia, iceland, reykjavik, reykjavík, luxembourg]
        - name: Nordic
          keywords: ['/\bnordic\b/', '/\bscandinavia\b/', scandinavian, sweden, stockholm, malmö, malmo, gothenburg, göteborg, goteborg, uppsala, norway, oslo, bergen, trondheim, denmark, copenhagen, aarhus, odense, finland, helsinki, espoo, tampere, iceland, reykjavik, reykjavík]
        - name: UK
          keywords: [united kingdom, '/\bUK\b/', '/\bGB\b/', england, scotland, wales, northern ireland, london, guildford, brighton, manchester, cambridge, oxford, leamington, edinburgh, glasgow, bristol, leeds, sheffield, dundee, liverpool, nottingham, newcastle]
        - name: North America
          keywords: [united states, '/\bUSA\b/', '/\bUS\b/', canada, california, new york, texas, washington, seattle, san francisco, los angeles, austin, raleigh, cary, north carolina, massachusetts, boston, florida, chicago, montreal, montréal, toronto, vancouver, quebec, québec, ontario, alberta, oregon, colorado, georgia, utah, arizona, nevada, san diego, carlsbad, novato, redmond, irvine, san mateo, burnaby]
        - name: Asia/Pacific
          keywords: [japan, tokyo, china, shanghai, beijing, singapore, korea, seoul, india, bangalore, bengaluru, hong kong, taiwan, australia, sydney, melbourne, brisbane, new zealand, auckland, philippines, manila, vietnam, malaysia, thailand]
        - name: Other
          else: true
    - name: Level
      # Match the source's own experience level FIRST, then the title. Some feeds
      # (e.g. Games Jobs Direct) expose a real per-posting experience level
      # (Junior-Associate / Mid-Senior Level / Director …); reading it ahead of
      # the title rates those postings on the authoritative value rather than a
      # title-word guess. Feeds without one contribute '' → the title still drives.
      field: [experiencelevel, title]
      combine: min
      weight: 0.13
      filters:
        - name: Lead+
          keywords: [lead, principal, '/\bhead\b/', director, chief, staff, '/\bVP\b/', manager]
        - name: Senior
          keywords: [senior, '/\bsr\b/', expert]
        - name: Junior
          keywords: [junior, '/\bjr\b/', intern, internship, graduate, entry, trainee, apprentice, associate]
        - name: Mid
          else: true
    - name: Mode
      # Multi-source: work mode now lives in the structured `workMode` field, but
      # some ATS still phrase it only in the location text. Read both so the
      # combined text catches either. 'anywhere' is geography-free remote, kept
      # distinct from 'remote' (most "remote" roles still pin a country/timezone).
      field: [workmode, location]
      combine: min
      weight: 0.10
      filters:
        - name: Anywhere
          keywords: [anywhere, distributed, work from anywhere]
        - name: Remote
          keywords: [remote, work from home, '/\bwfh\b/', fully remote]
        - name: Hybrid
          keywords: [hybrid]
        - name: On-site
          else: true
