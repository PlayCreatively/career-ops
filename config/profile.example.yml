# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Alex Rivers"
  email: "alex@example.com"
  phone: "+1-555-0123"
  location: "Montréal, QC"
  linkedin: "linkedin.com/in/alexrivers"
  portfolio_url: "https://alexrivers.dev"   # itch.io / personal site / demo reel
  github: "github.com/alexrivers"
  twitter: "https://x.com/alexrivers"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Gameplay Programmer"
    - "Senior Gameplay Programmer"
  # Archetypes help the evaluation system score fit.
  # Game-industry archetypes: Gameplay Programmer, Engine / Tools Programmer,
  # Game / Systems Designer, Technical Artist, Producer / PM, QA / QA Automation.
  archetypes:
    - name: "Gameplay Programmer"
      level: "Mid/Senior"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "Engine / Tools Programmer"
      level: "Mid"
      fit: "secondary"
    - name: "Technical Designer"
      level: "Mid"
      fit: "adjacent"

# Engine and platform focus — used by evaluation Block A and CV tailoring.
craft:
  engines:
    - "Unreal Engine (UE5, C++ + Blueprint)"
    - "Unity (C#)"
  shipped_titles:
    # The single strongest signal in games hiring — list what you shipped,
    # your role, platform, and engine. Leave empty if pre-shipping.
    - title: "Untitled Co-op Shooter"
      role: "Gameplay Programmer"
      platform: "PC / console"
      engine: "Unreal Engine 5"
  platforms:
    - "PC"
    - "Console (PS5 / Xbox Series)"
  # Studio types you'd consider (AAA / AA / indie / mobile / live-service)
  studio_preference:
    - "AA"
    - "Indie"

narrative:
  # Your professional headline (1 line)
  headline: "Gameplay programmer who turns design intent into shippable mechanics"
  # Your exit story — what makes you unique
  exit_story: "Shipped a co-op shooter as solo gameplay programmer; now targeting a larger combat/systems team."
  # Your top 3-5 superpowers
  superpowers:
    - "Translating design docs into responsive, tunable game-feel"
    - "Profiling and optimizing gameplay code on console hardware"
    - "Building designer-facing tools so non-engineers can iterate"
  # Proof points — shipped titles, prototypes, demo reels, jam games with measurable impact
  proof_points:
    - name: "Combat prototype (devlog)"
      url: "https://alexrivers.dev/combat-prototype"
      hero_metric: "Hitstop + input-buffer system, 6 enemy archetypes"
    - name: "Game jam — 48h winner"
      url: "https://alexrivers.itch.io/jam-game"
      hero_metric: "1st of 240 entries, Ludum Dare"
  # Optional: playable build / demo reel URL with credentials
  # dashboard:
  #   url: "https://alexrivers.dev/demo-reel"
  #   password: "demo-2026"

compensation:
  target_range: "$90K-130K CAD"  # Your target total comp
  currency: "CAD"
  minimum: "$80K CAD"            # Walk-away number
  location_flexibility: "Remote preferred; open to hybrid in Montréal. Relocation possible for the right studio."

location:
  country: "Canada"
  city: "Montréal"
  timezone: "EST"
  visa_status: "No sponsorship needed in Canada; would need sponsorship for US/UK/EU"
  # For remote roles or studios that require relocation:
  # onsite_availability: "Open to relocation for established studios"

cv:
  output_format: "html" # "html" (default) or "latex"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

# Auto-PDF threshold during evaluation (used by `/career-ops pipeline` and
# `bash batch/batch-runner.sh`).
#
# An offer's tailored CV PDF is auto-generated only when its score is
# >= this threshold. Generating a PDF costs ~30-60s per offer (Playwright
# launch + HTML render), and most offers in a scan score 2.x/3.x and never
# become an actual application — so the gate avoids wasted renders.
#
# Default (key absent OR commented out): 3.0 — the original gate of
# `/career-ops pipeline`. Both evaluation paths apply the same default, so
# a batch run and an interactive run treat the same offer identically.
#
# Raise it (e.g. 4.0) to auto-generate PDFs only for stronger matches and
# leave the rest report-only — those can still be produced on demand via
# `/career-ops pdf {company-slug}`. Fractional thresholds work (e.g. 3.5 —
# half-point scores like 3.5/5 occur in evaluations). Set it to 0 to
# generate a PDF for every offer.
# auto_pdf_score_threshold: 4.0
